<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp - Black Leo Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 850px;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .signup-page {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%);
            background-image: url('IMG_5.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            position: relative;
        }

        .signup-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .signup-page-content {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            margin-top: 150px;
        }

        .signup-title {
            font-size: 36px;
            font-weight: 800;
            color: white;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .signup-btn {
            width: 100%;
            background-color: #0066FF;
            color: white;
            text-decoration: none;
            text-align: center;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 102, 255, 0.5);
        }

        .already-have-account {
            background-color: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.6);
            padding: 16px 140px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .already-have-account:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: white;
            transform: translateY(-2px);
        }

        .back-btn {
            position: absolute;
            top: 30px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            z-index: 3;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 480px) {
            .app-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
            .signup-page-content {
                margin-top: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="signup-page">
            <a href="index.html" class="back-btn">← Back</a>
            <div class="signup-page-content">
                <h2 class="signup-title">SignUp</h2>
                <!-- Links to the email signup page -->
                <a href="email-signup.html" class="signup-btn">Create an Account</a>
                <a href="#" class="already-have-account">Log in</a> 
            </div>
        </div>
    </div>
</body>
</html>
