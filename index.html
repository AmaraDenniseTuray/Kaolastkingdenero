<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Leo Music App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 850px;
            background: white;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        /* Banner Section - 40% */
        .banner-section {
            height: 40%;
            position: relative;
            overflow: hidden;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slider-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .slider-wrapper {
            display: flex;
            width: 300%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide {
            width: 33.333%;
            height: 100%;
            flex-shrink: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Body Section - 60% */
        .body-section {
            height: 60%;
            background: white;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            padding: 15px 30px 30px 30px;
        }

        /* Slider Dots - Extreme Top Left of Body */
        .slider-dots {
            display: flex;
            gap: 8px;
            margin-top: 0;
            margin-bottom: 50px;
            padding-top: 0;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d1d5db;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dot.active {
            background: #0066FF;
            width: 28px;
            border-radius: 5px;
        }

        .dot:hover:not(.active) {
            background: #93b4f5;
        }

        /* Content */
        .welcome-title {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 16px;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        .welcome-text {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            margin-bottom: 35px;
        }

        .get-started-btn {
            background-color: #0066FF;
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 102, 255, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            align-self: center;
            margin-top: 135px;
        }

        .get-started-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 102, 255, 0.4);
        }

        .get-started-btn:active {
            transform: translateY(1px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .app-container {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Banner Section (40%) -->
        <div class="banner-section">
            <div class="slider-viewport">
                <div class="slider-wrapper" id="sliderWrapper">
                    <div class="slide">
                        <img src="IMG_1.jpeg" alt="Black Leo Artist" onerror="this.src='https://via.placeholder.com/400x600/1a1a2e/ffffff?text=Black+Leo+Artist'">
                    </div>
                    <div class="slide">
                        <img src="IMG_2.jpeg" alt="Light Over Darkness Concert" onerror="this.src='https://via.placeholder.com/400x600/16213e/ffffff?text=Light+Over+Darkness'">
                    </div>
                    <div class="slide">
                        <img src="IMG_3.jpeg" alt="Black Leo Squad Event" onerror="this.src='https://via.placeholder.com/400x600/0f3460/ffffff?text=Black+Leo+Squad'">
                    </div>
                </div>
            </div>
        </div>

        <!-- Body Section (60%) -->
        <div class="body-section">
            <!-- Slider Dots - Extreme Top -->
            <div class="slider-dots">
                <div class="dot active" data-index="0"></div>
                <div class="dot" data-index="1"></div>
                <div class="dot" data-index="2"></div>
            </div>

            <h1 class="welcome-title">WELCOME TO<br>BLACK LEO MUSIC</h1>
            <p class="welcome-text">
                Discover a universe of unlimited beats, curated playlists, and exclusive tracks tailored just for you. 
                Dive into the rhythm and let your favorite artists soundtrack your every moment.
            </p>
            <button class="get-started-btn">GET STARTED</button>
        </div>
    </div>

    <script>
        const sliderWrapper = document.getElementById('sliderWrapper');
        const dots = document.querySelectorAll('.dot');
        let currentIndex = 0;
        const totalSlides = 3;

        function updateSlider() {
            // Fixed: Move by 100% for each slide (not 100/totalSlides)
            sliderWrapper.style.transform = `translateX(-${currentIndex * 100}%)`;

            dots.forEach((dot, index) => {
                dot.classList.toggle('active', index === currentIndex);
            });
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            updateSlider();
        }

        dots.forEach((dot, index) => {
            dot.addEventListener('click', () => {
                currentIndex = index;
                updateSlider();
            });
        });

        // Auto-play slider
        setInterval(nextSlide, 3500);

        // Touch/Swipe support
        let touchStartX = 0;
        let touchEndX = 0;

        const banner = document.querySelector('.banner-section');

        banner.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        banner.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && currentIndex < totalSlides - 1) {
                    currentIndex++;
                } else if (diff < 0 && currentIndex > 0) {
                    currentIndex--;
                }
                updateSlider();
            }
        }, { passive: true });

        // Initialize slider
        updateSlider();
    </script>
</body>
</html>
