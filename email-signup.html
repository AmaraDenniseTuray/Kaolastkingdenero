            function getDomain(email) {
                const parts = email.split('@');
                return parts.length === 2 ? parts[1].toLowerCase() : '';
            }

            function isValidEmailFormat(email) {
                if (!email || typeof email !== 'string') return false;
                if (email.length < 6 || email.length > 254) return false;
                if (/\s/.test(email)) return false;
                if (/\.\./.test(email)) return false;
                if (!EMAIL_REGEX.test(email)) return false;
                const localPart = email.split('@')[0];
                if (localPart.length > 64) return false;
                const domain = email.split('@')[1];
                const labels = domain.split('.');
                for (const label of labels) {
                    if (label.length > 63 || label.length === 0) return false;
                }
                const tld = labels[labels.length - 1];
                if (tld.length < 2 || !/^[a-zA-Z]+$/.test(tld)) return false;
                return true;
            }

            function isDisposableEmail(domain) {
                return DISPOSABLE_DOMAINS.includes(domain);
            }

            function checkDomainTypo(email) {
                const domain = getDomain(email);
                return DOMAIN_TYPOS[domain] || null;
            }

            function isKnownProvider(email) {
                const domain = getDomain(email);
                return MAJOR_PROVIDERS.includes(domain);
            }

            // ============================================
            // DNS LOOKUP WITH TIMEOUT
            // ============================================
            async function fetchWithTimeout(url, timeoutMs) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    const response = await fetch(url, {
                        method: 'GET',
                        mode: 'cors',
                        signal: controller.signal
                    });
                    clearTimeout(timeout);
                    return response;
                } catch (error) {
                    clearTimeout(timeout);
                    throw error;
                }
            }

            // ============================================
            // MX RECORD VERIFICATION
            // ============================================
            async function verifyMXRecords(domain) {
                try {
                    const response = await fetchWithTimeout(
                        `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=MX`,
                        5000
                    );
                    if (!response.ok) return { hasMX: false, error: 'DNS query failed' };
                    const data = await response.json();
                    if (data.Status === 3) return { hasMX: false, error: 'Domain does not exist' };
                    if (data.Status !== 0) return { hasMX: false, error: 'DNS error' };
                    if (data.Answer && data.Answer.length > 0) {
                        const mxRecords = data.Answer.filter(record => record.Type === 15);
                        if (mxRecords.length > 0) {
                            return { hasMX: true, count: mxRecords.length };
                        }
                    }
                    return { hasMX: false, error: 'No mail servers found' };
                } catch (error) {
                    // Network/CORS error - return null to indicate check couldn't be done
                    return { hasMX: null, error: 'Network error' };
                }
            }

            // ============================================
            // DOMAIN EXISTENCE VERIFICATION
            // ============================================
            async function verifyDomainExists(domain) {
                try {
                    const response = await fetchWithTimeout(
                        `https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`,
                        5000
                    );
                    if (!response.ok) return { exists: null, error: 'DNS query failed' };
                    const data = await response.json();
                    if (data.Status === 3) return { exists: false, error: 'Domain does not exist' };
                    if (data.Status !== 0) return { exists: null, error: 'DNS error' };
                    if (data.Answer && data.Answer.length > 0) return { exists: true };
                    return { exists: false, error: 'Domain not found' };
                } catch (error) {
                    return { exists: null, error: 'Network error' };
                }
            }

            // ============================================
            // DISPOSABLE CHECK VIA API
            // ============================================
            async function verifyDisposableViaAPI(domain) {
                try {
                    const response = await fetchWithTimeout(
                        `https://open.kickbox.com/v1/disposable/${encodeURIComponent(domain)}`,
                        3000
                    );
                    if (response.ok) {
                        const data = await response.json();
                        return { disposable: data.disposable === true };
                    }
                    return { disposable: null };
                } catch (error) {
                    return { disposable: null };
                }
            }

            // ============================================
            // COMPREHENSIVE EMAIL VALIDATION
            // ============================================
            async function validateEmail(email) {
                const result = {
                    valid: false,
                    isActive: false,
                    message: '',
                    type: 'invalid'
                };

                if (!email || email.trim() === '') {
                    result.message = '';
                    return result;
                }

                email = email.trim().toLowerCase();

                // Step 1: Format validation
                if (!isValidEmailFormat(email)) {
                    result.message = 'Please enter a valid email format';
                    return result;
                }

                const domain = getDomain(email);

                // Step 2: Disposable check (local)
                if (isDisposableEmail(domain)) {
                    result.message = 'Disposable email addresses are not allowed. Please use a real email.';
                    return result;
                }

                // Step 3: Typo check
                const typo = checkDomainTypo(email);
                if (typo) {
                    result.message = `Did you mean ${email.split('@')[0]}@${typo}? Please correct it.`;
                    result.type = 'warning';
                    return result;
                }

                // Step 4: Known provider = INSTANT APPROVAL (no network calls needed)
                if (isKnownProvider(email)) {
                    result.valid = true;
                    result.isActive = true;
                    result.message = `✓ Active email - ${domain} is ready to receive messages`;
                    result.type = 'valid';
                    return result;
                }

                // Step 5: For unknown domains, try network verification
                try {
                    // Check domain exists
                    const domainCheck = await verifyDomainExists(domain);
                    
                    // If domain definitely doesn't exist, block
                    if (domainCheck.exists === false) {
                        result.message = `Domain "${domain}" does not exist. Please check your email.`;
                        return result;
                    }

                    // Check MX records
                    const mxCheck = await verifyMXRecords(domain);
                    
                    // If MX definitely doesn't exist, block
                    if (mxCheck.hasMX === false) {
                        result.message = 'This domain cannot receive emails. Please use a different email address.';
                        return result;
                    }

                    // Check disposable via API
                    const disposableCheck = await verifyDisposableViaAPI(domain);
                    if (disposableCheck.disposable === true) {
                        result.message = 'Disposable email addresses are not allowed. Please use a real email.';
                        return result;
                    }

                    // If network checks passed OR were inconclusive (null), allow
                    // null means the check couldn't be done (network issue) - be lenient
                    if (domainCheck.exists === true && mxCheck.hasMX === true) {
                        result.valid = true;
                        result.isActive = true;
                        result.message = `✓ Active email - Verified mail server at ${domain}`;
                        result.type = 'valid';
                    } else if (domainCheck.exists === null && mxCheck.hasMX === null) {
                        // Network failed entirely - trust format check, allow but warn
                        result.valid = true;
                        result.isActive = true;
                        result.message = `✓ Email format valid - Could not verify ${domain} (offline)`;
                        result.type = 'valid';
                    } else {
                        // Partial results - if domain exists but MX is null, or vice versa, allow
                        result.valid = true;
                        result.isActive = true;
                        result.message = `✓ Active email - ${domain} verified`;
                        result.type = 'valid';
                    }

                } catch (error) {
                    // If any unexpected error occurs, fall back to format validation
                    // This ensures the user is NEVER stuck
                    console.error('Validation error:', error);
                    result.valid = true;
                    result.isActive = true;
                    result.message = `✓ Email format valid - ${domain}`;
                    result.type = 'valid';
                }

                return result;
            }

                if (errorElement) errorElement.classList.remove('show');

                if (!result.message) return;

                statusElement.classList.add('show');
                statusText.textContent = result.message;

                if (result.type === 'valid') {
                    statusElement.classList.add('valid');
                    inputElement.classList.add('valid');
                    statusIcon.innerHTML = '<svg viewBox="0 0 24 24"><path fill="#10b981" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';

                    statusIcon.innerHTML = '<svg viewBox="0 0 24 24"><path fill="#f59e0b" d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>';

                        errorElement.textContent = result.message;
                        errorElement.classList.add('show');
                    }
                }

            // ============================================
            // DEBOUNCE
            // ============================================
            function debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }

                    emailInput.classList.remove('error', 'valid', 'checking');
                    statusElement.classList.remove('show');
                    errorElement.classList.remove('show');
                    return;

                statusElement.classList.add('show', 'checking');
                statusElement.classList.remove('valid', 'invalid');
                statusElement.querySelector('.status-icon').innerHTML = '<span class="spinner dark"></span>';
                statusElement.querySelector('.status-text').textContent = 'Verifying email...';

                    updateValidationStatus(statusElement, emailInput, errorElement, result);

                    emailInput.classList.add('valid');

                    statusElement.classList.add('show', 'valid');

                if (!email || email.trim() === '') {
                    inputField.classList.remove('error', 'valid', 'checking');
                    statusElement.classList.remove('show');
                    errorElement.classList.remove('show');
                    return;
                }

                inputField.classList.add('checking');
                inputField.classList.remove('error', 'valid');
                statusElement.classList.add('show', 'checking');
                statusElement.classList.remove('valid', 'invalid');
                statusElement.querySelector('.status-icon').innerHTML = '<span class="spinner dark"></span>';
                statusElement.querySelector('.status-text').textContent = 'Verifying email...';

                try {
                    const result = await validateEmail(email);
                    updateValidationStatus(statusElement, inputField, errorElement, result);
                } catch (error) {
                    console.error('Real-time validation error:', error);
                    inputField.classList.remove('checking');
                    inputField.classList.add('valid');
                    statusElement.classList.remove('checking');
                    statusElement.classList.add('show', 'valid');
                    statusElement.querySelector('.status-icon').innerHTML = '<svg viewBox="0 0 24 24"><path fill="#10b981" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
                    statusElement.querySelector('.status-text').textContent = '✓ Email format valid';
                }
            }, 500);

            emailInput.addEventListener('input', (e) => { validateMainEmail(e.target.value); });
            emailInput.addEventListener('blur', (e) => { if (e.target.value.trim()) validateMainEmail(e.target.value); });
            document.getElementById('providerEmail').addEventListener('input', (e) => { validateProviderEmail(e.target.value); });
            document.getElementById('providerEmail').addEventListener('blur', (e) => { if (e.target.value.trim()) validateProviderEmail(e.target.value); });

            // ============================================
            // CONTINUE BUTTON HANDLERS
            // ============================================

            // Provider (Google/Apple) Continue
            document.getElementById('providerContinueBtn').addEventListener('click', async () => {
                const emailField = document.getElementById('providerEmail');
                const emailError = document.getElementById('providerEmailError');
                const statusElement = document.getElementById('providerEmailStatus');
                const btn = document.getElementById('providerContinueBtn');
                const email = emailField.value.trim();
                const provider = document.getElementById('emailProviderTitle').textContent.replace('Continue with ', '');

                if (!email) {
                    emailField.classList.add('error');
                    emailError.textContent = 'Please enter your email address';
                    emailError.classList.add('show');
                    emailField.focus();
                    return;
                }

                // Show loading immediately
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Verifying...';

                try {
                    const result = await validateEmail(email);
                    updateValidationStatus(statusElement, emailField, emailError, result);

                    if (!result.isActive) {
                        btn.disabled = false;
                        btn.innerHTML = 'Continue';
                        emailField.classList.add('error');
                        emailError.textContent = result.message || 'Please use an active email address';
                        emailError.classList.add('show');
                        emailField.focus();
                        return;
                    }

                    // Active email - proceed
                    btn.innerHTML = '<span class="spinner"></span> Connecting...';
                    setTimeout(() => { showSuccess(provider, email); }, 1500);

                } catch (error) {
                    console.error('Provider continue error:', error);
                    btn.disabled = false;
                    btn.innerHTML = 'Continue';
                    emailError.textContent = 'Something went wrong. Please try again.';
                    emailError.classList.add('show');
                }
            });

            // Facebook Continue
            document.getElementById('fbContinueBtn').addEventListener('click', () => {
                const usernameField = document.getElementById('fbUsername');
                const passwordField = document.getElementById('fbPassword');
                const usernameError = document.getElementById('fbUsernameError');
                const passwordError = document.getElementById('fbPasswordError');
                const btn = document.getElementById('fbContinueBtn');
                const username = usernameField.value.trim();
                const password = passwordField.value.trim();

                usernameField.classList.remove('error');
                passwordField.classList.remove('error');
                usernameError.classList.remove('show');
                passwordError.classList.remove('show');

                let hasError = false;
                if (!username) {
                    usernameField.classList.add('error');
                    usernameError.classList.add('show');
                    if (!hasError) usernameField.focus();
                    hasError = true;
                }
                if (!password) {
                    passwordField.classList.add('error');
                    passwordError.classList.add('show');
                    if (!hasError) passwordField.focus();
                    hasError = true;
                }
                if (hasError) return;

                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Connecting...';

                setTimeout(() => {
                    const fbEmail = username.includes('@') ? username : `${username}@facebook.com`;
                    showSuccess('Facebook', fbEmail);
                }, 1500);
            });

            // Main Continue
            continueBtn.addEventListener('click', async () => {
                const email = emailInput.value.trim();
                const emailError = document.getElementById('emailError');
                const statusElement = document.getElementById('emailStatus');

                if (!email) {
                    emailInput.classList.add('error');
                    emailError.textContent = 'Please enter your email address';
                    emailError.classList.add('show');
                    emailInput.focus();
                    return;
                }

                // Show loading immediately
                continueBtn.disabled = true;
                continueBtn.innerHTML = '<span class="spinner"></span> Verifying...';

                try {
                    const result = await validateEmail(email);
                    updateValidationStatus(statusElement, emailInput, emailError, result);

                    if (!result.isActive) {
                        continueBtn.disabled = false;
                        continueBtn.innerHTML = 'Continue';
                        emailInput.classList.add('error');
                        emailError.textContent = result.message || 'Please use an active email address';
                        emailError.classList.add('show');
                        emailInput.focus();
                        return;
                    }

                    // Active email - proceed
                    continueBtn.innerHTML = '<span class="spinner"></span> Creating account...';
                    setTimeout(() => { showSuccess('Email', email); }, 1500);

                } catch (error) {
                    console.error('Continue error:', error);
                    continueBtn.disabled = false;
                    continueBtn.innerHTML = 'Continue';
                    emailError.textContent = 'Something went wrong. Please try again.';
                    emailError.classList.add('show');
                }
            });

            // Social button handlers
            function attachSocialHandlers() {
                document.querySelectorAll('.social-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        showProviderForm(btn.getAttribute('data-provider'));
                    });
                });
            }
            attachSocialHandlers();

            // Login button
            if (loginBtn) {
                loginBtn.addEventListener('click', () => {
                    loginPrompt.style.display = 'none';
                    dividerText.textContent = 'Log in with';
                    socialButtons.innerHTML = `
                        <button class="social-btn google-btn" data-provider="Google">
                            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                            Continue with Google
                        </button>
                        <button class="social-btn facebook-btn" data-provider="Facebook" style="margin-top: 12px;">
                            <svg viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                            Continue with Facebook
                        </button>
                        <button class="social-btn apple-btn" data-provider="Apple" style="margin-top: 12px;">
                            <svg viewBox="0 0 24 24" fill="#000000"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
                            Continue with Apple
                        </button>
                        <div class="signup-prompt">
                            Don't have an account?<br>
                            <button type="button" class="signup-link">Sign up</button>
                        </div>
                    `;
                    attachSocialHandlers();
                    const newSignupBtn = socialButtons.querySelector('.signup-link');
                    if (newSignupBtn) {
                        newSignupBtn.addEventListener('click', () => {
                            window.location.href = 'sSignup-page.html';
                        });
                    }
                });
            }

            // Enter key support
            document.getElementById('providerEmail').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('providerContinueBtn').click();
            });
            document.getElementById('fbPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('fbContinueBtn').click();
            });
            document.getElementById('fbUsername').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('fbPassword').focus();
            });
            emailInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') continueBtn.click();
            });
        });
    </script>
