<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player - Black Leo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .player-container { width: 100%; max-width: 450px; height: 850px; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column; color: white; }
        .player-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('Heroes Album.jpg'); background-size: cover; background-position: center; filter: blur(40px) brightness(0.4); transform: scale(1.2); z-index: 0; transition: background-image 0.5s ease; }
        .player-bg::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.1) 40%, rgba(10,10,10,0.6) 100%); }
        .top-bar { position: relative; z-index: 10; display: flex; justify-content: space-between; align-items: center; padding: 25px 25px 15px 25px; }
        .back-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; text-decoration: none; }
        .back-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        .back-btn svg { width: 20px; height: 20px; fill: white; }
        .top-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; opacity: 0.8; }
        .more-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .more-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .more-btn svg { width: 20px; height: 20px; fill: white; }
        .album-art-container { position: relative; z-index: 10; padding: 20px 30px; display: flex; justify-content: center; flex: 1; align-items: center; }
        .album-art { width: 100%; max-width: 320px; aspect-ratio: 1; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; transition: transform 0.5s ease; }
        .album-art.playing { animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .album-art img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s ease; }
        .album-art::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(0,0,0,0.2) 100%); pointer-events: none; }
        .song-info { position: relative; z-index: 10; padding: 10px 30px 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .song-details { flex: 1; min-width: 0; }
        .song-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-artist { font-size: 14px; opacity: 0.7; font-weight: 500; }
        .song-artist span { opacity: 0.6; font-size: 12px; }
        .like-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; margin-left: 15px; flex-shrink: 0; }
        .like-btn svg { width: 22px; height: 22px; fill: none; stroke: white; stroke-width: 2; transition: all 0.3s; }
        .like-btn.liked { background: rgba(239, 68, 68, 0.2); }
        .like-btn.liked svg { fill: #ef4444; stroke: #ef4444; }
        .like-btn:hover { transform: scale(1.1); }
        .progress-section { position: relative; z-index: 10; padding: 0 30px 20px 30px; }
        .progress-bar-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 2px; position: relative; cursor: pointer; transition: height 0.2s; }
        .progress-bar-container:hover { height: 6px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 2px; width: 0%; position: relative; transition: width 0.1s linear; }
        .progress-thumb { position: absolute; right: -7px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; background: white; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.2s; }
        .progress-bar-container:hover .progress-thumb { opacity: 1; }
        .time-display { display: flex; justify-content: space-between; margin-top: 10px; font-size: 11px; opacity: 0.6; font-weight: 500; }
        .controls { position: relative; z-index: 10; padding: 10px 30px 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .control-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: white; }
        .control-btn svg { fill: white; transition: all 0.2s; }
        .control-btn:hover { transform: scale(1.1); }
        .control-btn.small svg { width: 22px; height: 22px; opacity: 0.7; }
        .control-btn.small.active svg { opacity: 1; fill: #7c3aed; }
        .control-btn.medium svg { width: 32px; height: 32px; }
        .play-pause-btn { width: 70px; height: 70px; border-radius: 50%; background: white; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .play-pause-btn:hover { transform: scale(1.08); box-shadow: 0 12px 35px rgba(0,0,0,0.4); }
        .play-pause-btn svg { width: 28px; height: 28px; fill: #111827; margin-left: 3px; }
        .play-pause-btn.playing svg { margin-left: 0; }
        .extra-actions { position: relative; z-index: 10; padding: 10px 30px 20px 30px; display: flex; justify-content: space-around; align-items: center; }
        .action-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; background: none; border: none; cursor: pointer; color: white; transition: all 0.2s; padding: 10px; }
        .action-btn svg { width: 22px; height: 22px; fill: white; opacity: 0.7; transition: all 0.2s; }
        .action-btn span { font-size: 10px; opacity: 0.6; font-weight: 500; }
        .action-btn:hover svg, .action-btn.active svg { opacity: 1; fill: #7c3aed; }
        .action-btn.active span { opacity: 1; color: #7c3aed; }
        .mini-player { position: relative; z-index: 10; margin: 0 20px 20px 20px; padding: 12px 15px; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; }
        .mini-player:hover { background: rgba(255, 255, 255, 0.12); transform: translateY(-2px); }
        .mini-player-cover { width: 45px; height: 45px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
        .mini-player-cover img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.3s ease; }
        .mini-player-info { flex: 1; min-width: 0; }
        .mini-player-label { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
        .mini-player-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .mini-player-artist { font-size: 11px; opacity: 0.6; }
        .mini-player-play { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.15); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
        .mini-player-play:hover { background: rgba(255, 255, 255, 0.25); }
        .mini-player-play svg { width: 14px; height: 14px; fill: white; margin-left: 2px; }
        
        /* Lyrics, Queue & Share Overlays */
        .lyrics-overlay, .queue-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 10, 10, 0.97); backdrop-filter: blur(20px); z-index: 100; display: none; flex-direction: column; padding: 30px 25px; overflow-y: auto; }
        .lyrics-overlay.show, .queue-overlay.show { display: flex; }
        .lyrics-header, .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-shrink: 0; }
        .lyrics-title, .queue-title { font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.7; }
        .lyrics-close, .queue-close { width: 36px; height: 36px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .lyrics-close svg, .queue-close svg { width: 18px; height: 18px; fill: white; }
        .lyrics-content { flex: 1; display: flex; flex-direction: column; gap: 18px; }
        .lyric-line { font-size: 22px; font-weight: 700; opacity: 0.3; transition: all 0.3s; line-height: 1.4; }
        .lyric-line.active { opacity: 1; color: #7c3aed; transform: scale(1.05); transform-origin: left; }
        .lyric-line.passed { opacity: 0.5; }
        .lyrics-song-info { font-size: 12px; opacity: 0.5; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .no-lyrics { text-align: center; padding: 40px 20px; opacity: 0.5; font-size: 14px; }
        
        /* Queue Styles */
        .queue-content { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .queue-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; margin: 15px 0 8px 0; }
        .queue-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
        .queue-item:hover { background: rgba(255, 255, 255, 0.08); }
        .queue-item.current { background: rgba(124, 58, 237, 0.15); }
        .queue-item-number { width: 24px; font-size: 12px; opacity: 0.5; text-align: center; flex-shrink: 0; }
        .queue-item.current .queue-item-number { color: #7c3aed; opacity: 1; }
        .queue-item-cover { width: 40px; height: 40px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .queue-item-cover img { width: 100%; height: 100%; object-fit: cover; }
        .queue-item-info { flex: 1; min-width: 0; }
        .queue-item-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .queue-item.current .queue-item-title { color: #7c3aed; }
        .queue-item-artist { font-size: 11px; opacity: 0.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .queue-item-duration { font-size: 11px; opacity: 0.5; flex-shrink: 0; }
        .queue-item.current .queue-item-duration { color: #7c3aed; }
        .playing-indicator { display: inline-flex; align-items: flex-end; gap: 2px; height: 14px; margin-right: 4px; }
        .playing-indicator span { display: block; width: 3px; background: #7c3aed; animation: playingBars 0.8s ease-in-out infinite; }
        .playing-indicator span:nth-child(1) { height: 40%; animation-delay: 0s; }
        .playing-indicator span:nth-child(2) { height: 80%; animation-delay: 0.2s; }
        .playing-indicator span:nth-child(3) { height: 60%; animation-delay: 0.4s; }
        @keyframes playingBars { 0%, 100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); } }
        
        /* Share Modal */
        .share-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
        .share-modal.show { display: flex; }
        .share-modal-content { background: #1a1a1a; border-radius: 20px; padding: 25px; width: 100%; max-width: 320px; border: 1px solid rgba(255,255,255,0.1); }
        .share-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .share-modal-title { font-size: 16px; font-weight: 700; }
        .share-modal-close { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .share-modal-close svg { width: 16px; height: 16px; fill: white; }
        .share-song-info { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 20px; }
        .share-song-cover { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
        .share-song-cover img { width: 100%; height: 100%; object-fit: cover; }
        .share-song-details { flex: 1; min-width: 0; }
        .share-song-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
        .share-song-artist { font-size: 12px; opacity: 0.6; }
        .share-options { display: flex; flex-direction: column; gap: 8px; }
        .share-option { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border: none; border-radius: 12px; color: white; cursor: pointer; transition: all 0.2s; font-size: 14px; font-weight: 500; text-align: left; width: 100%; }
        .share-option:hover { background: rgba(255,255,255,0.1); transform: translateX(4px); }
        .share-option svg { width: 20px; height: 20px; flex-shrink: 0; }
        .share-option.copy-link svg { fill: #7c3aed; }
        .share-option.whatsapp svg { fill: #25D366; }
        .share-option.facebook svg { fill: #1877F2; }
        .share-option.twitter svg { fill: #1DA1F2; }
        .share-option.native-share svg { fill: #f59e0b; }
        .share-toast { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
        .share-toast.show { opacity: 1; }
        
        @media (max-width: 480px) { .player-container { height: 100vh; max-width: 100%; border-radius: 0; } }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-bg" id="playerBg"></div>
        <div class="top-bar">
            <a href="sHome-page.html" class="back-btn">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </a>
            <div class="top-title">Now Playing</div>
            <button class="more-btn">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
            </button>
        </div>
        <div class="album-art-container">
            <div class="album-art" id="albumArt">
                <img src="Heroes Album.jpg" alt="Album Cover" id="albumCover">
            </div>
        </div>
        <div class="song-info">
            <div class="song-details">
                <div class="song-title" id="songTitle">Intro Think About it</div>
                <div class="song-artist" id="songArtist">Kao Denero <span>• Kao Denero</span></div>
            </div>
            <button class="like-btn" id="likeBtn">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
        </div>
        <div class="progress-section">
            <div class="progress-bar-container" id="progressContainer">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-thumb"></div>
                </div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>
        <div class="controls">
            <button class="control-btn small" id="shuffleBtn">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="control-btn medium" id="prevBtn">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="play-pause-btn" id="playPauseBtn">
                <svg viewBox="0 0 24 24" id="playPauseIcon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="control-btn medium" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="control-btn small" id="repeatBtn">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
        <div class="extra-actions">
            <button class="action-btn" id="lyricsBtn">
                <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Lyrics</span>
            </button>
            <button class="action-btn" id="queueBtn">
                <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
                <span>Queue</span>
            </button>
            <button class="action-btn" id="shareBtn">
                <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
                <span>Share</span>
            </button>
            <button class="action-btn">
                <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                <span>Radio</span>
            </button>
        </div>
        <div class="mini-player" id="miniPlayer">
            <div class="mini-player-cover">
                <img src="Heroes Album.jpg" alt="Next" id="nextCover">
            </div>
            <div class="mini-player-info">
                <div class="mini-player-label">Up Next</div>
                <div class="mini-player-title" id="nextTitle">Tonight</div>
                <div class="mini-player-artist" id="nextArtist">Kao Denero feat. Keltony</div>
            </div>
            <button class="mini-player-play" id="nextPlayBtn">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>
        
        <!-- Lyrics Overlay -->
        <div class="lyrics-overlay" id="lyricsOverlay">
            <div class="lyrics-header">
                <div class="lyrics-title">Lyrics</div>
                <button class="lyrics-close" id="lyricsClose">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="lyrics-song-info" id="lyricsSongInfo"></div>
            <div class="lyrics-content" id="lyricsContent"></div>
        </div>
        
        <!-- Queue Overlay -->
        <div class="queue-overlay" id="queueOverlay">
            <div class="queue-header">
                <div class="queue-title">Queue</div>
                <button class="queue-close" id="queueClose">
                    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="queue-content" id="queueContent"></div>
        </div>
        
        <!-- Share Modal -->
        <div class="share-modal" id="shareModal">
            <div class="share-modal-content">
                <div class="share-modal-header">
                    <div class="share-modal-title">Share Song</div>
                    <button class="share-modal-close" id="shareClose">
                        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                    </button>
                </div>
                <div class="share-song-info" id="shareSongInfo">
                    <div class="share-song-cover">
                        <img id="shareCover" src="Heroes Album.jpg" alt="Cover">
                    </div>
                    <div class="share-song-details">
                        <div class="share-song-title" id="shareTitle">Intro Think About it</div>
                        <div class="share-song-artist" id="shareArtist">Kao Denero</div>
                    </div>
                </div>

        let currentSongIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0;

        const audioPlayer = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const playPauseIcon = document.getElementById('playPauseIcon');
        const albumArt = document.getElementById('albumArt');
        const albumCover = document.getElementById('albumCover');
        const playerBg = document.getElementById('playerBg');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const progressBar = document.getElementById('progressBar');
        const progressContainer = document.getElementById('progressContainer');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const repeatBtn = document.getElementById('repeatBtn');
        const likeBtn = document.getElementById('likeBtn');
        const lyricsBtn = document.getElementById('lyricsBtn');
        const lyricsOverlay = document.getElementById('lyricsOverlay');
        const lyricsClose = document.getElementById('lyricsClose');
        const nextPlayBtn = document.getElementById('nextPlayBtn');
        
        // New elements
        const queueBtn = document.getElementById('queueBtn');
        const queueOverlay = document.getElementById('queueOverlay');
        const queueClose = document.getElementById('queueClose');
        const queueContent = document.getElementById('queueContent');
        const shareBtn = document.getElementById('shareBtn');
        const shareModal = document.getElementById('shareModal');
        const shareClose = document.getElementById('shareClose');
        const shareToast = document.getElementById('shareToast');

        function loadSong(index) {
            const song = songLibrary[index];
            audioPlayer.src = song.audio;
            albumCover.src = song.cover;
            playerBg.style.backgroundImage = `url('${song.cover}')`;
            songTitle.textContent = song.title;
            songArtist.innerHTML = `${song.artist} <span>• ${song.album}</span>`;
            
            const nextIndex = (index + 1) % songLibrary.length;
            const nextSong = songLibrary[nextIndex];
            document.getElementById('nextCover').src = nextSong.cover;
            document.getElementById('nextTitle').textContent = nextSong.title;
            document.getElementById('nextArtist').textContent = nextSong.artist;
            
            progressBar.style.width = '0%';
            currentTimeEl.textContent = '0:00';
            
            // Update lyrics when song changes
            loadLyrics(song.title, song.artist);
        }

        // ============================================
        // LYRICS SYSTEM
        // ============================================
        function loadLyrics(title, artist) {
            const lyricsContent = document.getElementById('lyricsContent');
            const lyricsSongInfo = document.getElementById('lyricsSongInfo');
            
            lyricsSongInfo.innerHTML = `<strong>${title}</strong> • ${artist}`;
            
            const lyrics = songLyrics[title];
            
            if (lyrics && lyrics.length > 0) {
                lyricsContent.innerHTML = '';
                lyrics.forEach((line, index) => {
                    const lineEl = document.createElement('div');
                    lineEl.className = 'lyric-line';
                    lineEl.textContent = line || '♪';
                    lineEl.dataset.index = index;
                    lyricsContent.appendChild(lineEl);
                });
                
                // Set first line as active
                const firstLine = lyricsContent.querySelector('.lyric-line');
                if (firstLine) firstLine.classList.add('active');
            } else {
                lyricsContent.innerHTML = `
                    <div class="no-lyrics">
                        <p>♪ Lyrics not available for this song ♪</p>
                        <p style="margin-top: 10px; font-size: 12px;">Enjoy the music!</p>
                    </div>
                `;
            }
        }

        // Sync lyrics with audio playback
        function syncLyrics() {
            if (!audioPlayer.duration || !lyricsOverlay.classList.contains('show')) return;
            
            const lyricsLines = document.querySelectorAll('.lyric-line');
            if (lyricsLines.length === 0) return;
            
            const progress = audioPlayer.currentTime / audioPlayer.duration;
            const activeIndex = Math.floor(progress * lyricsLines.length);
            
            lyricsLines.forEach((line, index) => {
                line.classList.remove('active', 'passed');
                if (index < activeIndex) {
                    line.classList.add('passed');
                } else if (index === activeIndex) {
                    line.classList.add('active');
                    // Scroll to active line
                    line.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            });
        }

        // ============================================
        // QUEUE SYSTEM
        // ============================================
        function loadQueue() {
            queueContent.innerHTML = '';
            
            // Current song section
            const currentSection = document.createElement('div');
            currentSection.className = 'queue-section-title';
            currentSection.textContent = 'Now Playing';
            queueContent.appendChild(currentSection);
            
            const currentSong = songLibrary[currentSongIndex];
            const currentItem = createQueueItem(currentSongIndex, currentSong, true);
            queueContent.appendChild(currentItem);
            
            // Up next section
            const nextSection = document.createElement('div');
            nextSection.className = 'queue-section-title';
            nextSection.textContent = 'Up Next';
            queueContent.appendChild(nextSection);
            
            // Show next 10 songs
            const songsToShow = Math.min(10, songLibrary.length - 1);
            for (let i = 1; i <= songsToShow; i++) {
                const songIndex = (currentSongIndex + i) % songLibrary.length;
                const song = songLibrary[songIndex];
                const item = createQueueItem(songIndex, song, false);
                queueContent.appendChild(item);
            }
        }

        function createQueueItem(index, song, isCurrent) {
            const item = document.createElement('div');
            item.className = 'queue-item' + (isCurrent ? ' current' : '');
            item.dataset.index = index;
            
            const number = document.createElement('div');
            number.className = 'queue-item-number';
            if (isCurrent) {
                number.innerHTML = '<div class="playing-indicator"><span></span><span></span><span></span></div>';
            } else {
                number.textContent = index + 1;
            }
            
            const cover = document.createElement('div');
            cover.className = 'queue-item-cover';
            const coverImg = document.createElement('img');
            coverImg.src = song.cover;
            coverImg.alt = song.title;
            cover.appendChild(coverImg);
            
            const info = document.createElement('div');
            info.className = 'queue-item-info';
            const title = document.createElement('div');
            title.className = 'queue-item-title';
            title.textContent = song.title;
            const artist = document.createElement('div');
            artist.className = 'queue-item-artist';
            artist.textContent = song.artist;
            info.appendChild(title);
            info.appendChild(artist);
            
            item.appendChild(number);
            item.appendChild(cover);
            item.appendChild(info);
            
            // Click to jump to song
            if (!isCurrent) {
                item.addEventListener('click', () => {
                    currentSongIndex = parseInt(item.dataset.index);
                    loadSong(currentSongIndex);
                    audioPlayer.play().catch(e => console.log('Playback failed:', e));
                    isPlaying = true;
                    playPauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    albumArt.classList.add('playing');
                    playPauseBtn.classList.add('playing');
                    queueOverlay.classList.remove('show');
                });
            }
            
            return item;
        }

        // ============================================
        // SHARE SYSTEM
        // ============================================
        function loadShareInfo() {
            const song = songLibrary[currentSongIndex];
            document.getElementById('shareCover').src = song.cover;
            document.getElementById('shareTitle').textContent = song.title;
            document.getElementById('shareArtist').textContent = song.artist;
            
            // Show native share button if supported
            if (navigator.share) {
                document.getElementById('nativeShareBtn').style.display = 'flex';
            } else {
                document.getElementById('nativeShareBtn').style.display = 'none';
            }
        }

        function getShareUrl() {
            const song = songLibrary[currentSongIndex];
            const baseUrl = window.location.href.split('?')[0];
            return `${baseUrl}?index=${currentSongIndex}`;
        }

        function getShareText() {
            const song = songLibrary[currentSongIndex];
            return `🎵 Listening to "${song.title}" by ${song.artist} on Black Leo Music!`;
        }

        function showToast(message) {
            shareToast.textContent = message;
            shareToast.classList.add('show');
            setTimeout(() => {
                shareToast.classList.remove('show');
            }, 2000);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-999999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                    return true;
                } catch (err) {
                    document.body.removeChild(textArea);
                    return false;
                }
            }
        }

        function togglePlayPause() {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                albumArt.classList.remove('playing');
                playPauseBtn.classList.remove('playing');
            } else {
                audioPlayer.play().catch(e => console.log('Playback failed:', e));
                playPauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                albumArt.classList.add('playing');
                playPauseBtn.classList.add('playing');
            }
            isPlaying = !isPlaying;
        }

        function nextSong() {
            if (isShuffle) {
                currentSongIndex = Math.floor(Math.random() * songLibrary.length);
            } else {
                currentSongIndex = (currentSongIndex + 1) % songLibrary.length;
            }
            loadSong(currentSongIndex);
            if (isPlaying) audioPlayer.play().catch(e => console.log('Playback failed:', e));
        }

        function prevSong() {
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
            } else {
                currentSongIndex = (currentSongIndex - 1 + songLibrary.length) % songLibrary.length;
                loadSong(currentSongIndex);
                if (isPlaying) audioPlayer.play().catch(e => console.log('Playback failed:', e));
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        audioPlayer.addEventListener('timeupdate', () => {
            if (audioPlayer.duration) {
                const progress = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = progress + '%';
                currentTimeEl.textContent = formatTime(audioPlayer.currentTime);
                syncLyrics();
            }
        });

        audioPlayer.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audioPlayer.duration);
        });

        audioPlayer.addEventListener('ended', () => {
            if (repeatMode === 2) {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else if (repeatMode === 1 || currentSongIndex < songLibrary.length - 1) {
                nextSong();
            } else {
                isPlaying = false;
                playPauseIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                albumArt.classList.remove('playing');
                playPauseBtn.classList.remove('playing');
            }
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audioPlayer.duration) audioPlayer.currentTime = percent * audioPlayer.duration;
        });

        playPauseBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);

        shuffleBtn.addEventListener('click', () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active', isShuffle);
        });

        repeatBtn.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            repeatBtn.classList.toggle('active', repeatMode > 0);
            if (repeatMode === 2) {
                repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/><text x="12" y="15" font-size="7" text-anchor="middle" fill="currentColor" font-weight="bold">1</text></svg>';
            } else {
                repeatBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>';
            }
        });

        likeBtn.addEventListener('click', () => likeBtn.classList.toggle('liked'));
        
        // Lyrics button
        lyricsBtn.addEventListener('click', () => {
            loadLyrics(songLibrary[currentSongIndex].title, songLibrary[currentSongIndex].artist);
            lyricsOverlay.classList.add('show');
        });
        lyricsClose.addEventListener('click', () => lyricsOverlay.classList.remove('show'));
        
        // Queue button
        queueBtn.addEventListener('click', () => {
            loadQueue();
            queueOverlay.classList.add('show');
        });
        queueClose.addEventListener('click', () => queueOverlay.classList.remove('show'));
        
        // Share button
        shareBtn.addEventListener('click', () => {
            loadShareInfo();
            shareModal.classList.add('show');
        });
        shareClose.addEventListener('click', () => shareModal.classList.remove('show'));
        shareModal.addEventListener('click', (e) => {
            if (e.target === shareModal) shareModal.classList.remove('show');
        });
        
        // Share options
        document.getElementById('copyLinkBtn').addEventListener('click', async () => {
            const url = getShareUrl();
            const success = await copyToClipboard(url);
            if (success) {
                showToast('✓ Link copied to clipboard!');
            } else {
                showToast('✗ Failed to copy link');
            }
            shareModal.classList.remove('show');
        });
        
        document.getElementById('whatsappBtn').addEventListener('click', () => {
            const text = getShareText() + ' ' + getShareUrl();
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            shareModal.classList.remove('show');
        });
        
        document.getElementById('facebookBtn').addEventListener('click', () => {
            const url = getShareUrl();
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            shareModal.classList.remove('show');
        });
        
        document.getElementById('twitterBtn').addEventListener('click', () => {
            const text = getShareText();
            const url = getShareUrl();
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
            shareModal.classList.remove('show');
        });
        
        document.getElementById('nativeShareBtn').addEventListener('click', async () => {
            try {
                await navigator.share({
                    title: songLibrary[currentSongIndex].title,
                    text: getShareText(),
                    url: getShareUrl()
                });
                shareModal.classList.remove('show');
            } catch (err) {
                if (err.name !== 'AbortError') {
                    showToast('Share cancelled');
                }
            }
        });
        
        nextPlayBtn.addEventListener('click', (e) => { e.stopPropagation(); nextSong(); });

        const urlParams = new URLSearchParams(window.location.search);
        const startIndex = parseInt(urlParams.get('index'));

        if (!isNaN(startIndex) && startIndex >= 0 && startIndex < songLibrary.length) {
            currentSongIndex = startIndex;
        }

        loadSong(currentSongIndex);

        if (urlParams.has('index')) {
            setTimeout(() => {
                audioPlayer.play().then(() => {
                    isPlaying = true;
                    playPauseIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                    albumArt.classList.add('playing');
                    playPauseBtn.classList.add('playing');
                }).catch(err => console.log("Autoplay blocked by browser policy.", err));
            }, 300);
        }
    </script>
